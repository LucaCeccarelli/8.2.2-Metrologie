kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: tp-elk
nodes:
  - role: control-plane
    extraMounts:
      - hostPath: datasets
        containerPath: /datasets
        readOnly: true
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      - containerPort: 30056
        hostPort: 5601
        protocol: TCP
