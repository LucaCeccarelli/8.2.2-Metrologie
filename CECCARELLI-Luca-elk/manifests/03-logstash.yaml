---
# ConfigMap: Logstash pipeline for application logs
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-pipeline
  namespace: elk
data:
  logstash.conf: |
    input {
      beats {
        port => 5044
      }
    }

    filter {
      # Only process logs from our application pods
      if [kubernetes][labels][app] == "http-app" {
        # Parse the JSON log line produced by python-json-logger
        json {
          source => "message"
          target => "app"
        }

        # Promote key fields to top level for easy querying in Kibana
        if [app][@timestamp] {
          date {
            match => ["[app][@timestamp]", "yyyy-MM-dd'T'HH:mm:ss"]
            target => "@timestamp"
          }
        }

        mutate {
          copy => {
            "[app][level]"       => "level"
            "[app][request_id]"  => "request_id"
            "[app][method]"      => "http_method"
            "[app][path]"        => "http_path"
            "[app][status_code]" => "http_status_code"
            "[app][status_family]" => "http_status_family"
            "[app][duration_ms]" => "duration_ms"
            "[app][action]"      => "action"
            "[app][message]"     => "app_message"
          }
        }

        mutate {
          convert => {
            "http_status_code" => "integer"
            "duration_ms"      => "float"
          }
          add_field => { "log_type" => "app" }
          remove_field => ["message"]
        }
      } else {
        # Technical logs from other pods — tag them and keep as-is
        mutate {
          add_field => { "log_type" => "system" }
        }
      }
    }

    output {
      if [log_type] == "app" {
        elasticsearch {
          hosts => ["http://elasticsearch:9200"]
          index => "app-logs-%{+YYYY.MM.dd}"
        }
      } else {
        elasticsearch {
          hosts => ["http://elasticsearch:9200"]
          index => "k8s-system-logs-%{+YYYY.MM.dd}"
        }
      }
    }
---
# ConfigMap: Logstash JVM options
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-jvm
  namespace: elk
data:
  jvm.options: |
    -Xms256m
    -Xmx256m
---
# ConfigMap: Logstash settings
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-settings
  namespace: elk
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    xpack.monitoring.enabled: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: elk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.19.16
          ports:
            - containerPort: 5044
              name: beats
          volumeMounts:
            - name: pipeline
              mountPath: /usr/share/logstash/pipeline
            - name: jvm
              mountPath: /usr/share/logstash/config/jvm.options
              subPath: jvm.options
            - name: settings
              mountPath: /usr/share/logstash/config/logstash.yml
              subPath: logstash.yml
          readinessProbe:
            httpGet:
              path: /
              port: 9600
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "300m"
            limits:
              memory: "768Mi"
              cpu: "600m"
      volumes:
        - name: pipeline
          configMap:
            name: logstash-pipeline
        - name: jvm
          configMap:
            name: logstash-jvm
        - name: settings
          configMap:
            name: logstash-settings
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: elk
spec:
  selector:
    app: logstash
  ports:
    - name: beats
      port: 5044
      targetPort: 5044
