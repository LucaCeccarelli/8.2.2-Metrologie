---
# Job: import Air Quality CSV into Elasticsearch via Logstash
# The dataset is mounted from the kind node (hostPath extraMount in kind-cluster.yaml)
#
# Kubernetes va relancer le Job automatiquement en cas d'échec (backoff exponentiel).
# backoffLimit élevé pour laisser le temps à Elasticsearch de démarrer (~90s).
apiVersion: batch/v1
kind: Job
metadata:
  name: air-quality-importer
  namespace: elk
spec:
  backoffLimit: 8
  template:
    metadata:
      labels:
        app: air-quality-importer
    spec:
      restartPolicy: OnFailure
      containers:
        - name: air-quality-importer
          # Tag figé — à rebuilder si l'on modifie air-quality-importer/
          # Commande: docker build -t air-quality-importer:1.0.0 air-quality-importer/ && kind load docker-image air-quality-importer:1.0.0 --name tp-elk
          image: air-quality-importer:1.0.0
          imagePullPolicy: IfNotPresent
          env:
            - name: XPACK_MONITORING_ENABLED
              value: "false"
          volumeMounts:
            - name: datasets
              mountPath: /datasets
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "300m"
            limits:
              memory: "768Mi"
              cpu: "600m"
      volumes:
        - name: datasets
          hostPath:
            path: /datasets
            type: Directory
