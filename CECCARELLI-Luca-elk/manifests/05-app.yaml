---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-app
  namespace: elk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-app
  template:
    metadata:
      labels:
        app: http-app
    spec:
      containers:
        - name: http-app
          # Tag figé — à rebuilder si l'on modifie app/
          # Commande: docker build -t http-app:1.0.0 app/ && kind load docker-image http-app:1.0.0 --name tp-elk
          image: http-app:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: http-app
  namespace: elk
spec:
  type: NodePort
  selector:
    app: http-app
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
