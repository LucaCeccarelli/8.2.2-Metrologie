apiVersion: apps/v1
kind: Deployment
metadata:
  name: tpmetrics-app
  namespace: app
  labels:
    app: tpmetrics-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tpmetrics-app
  template:
    metadata:
      labels:
        app: tpmetrics-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: tpmetrics-app
          image: tpmetrics-app:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: tpmetrics-app
  namespace: app
  labels:
    app: tpmetrics-app
spec:
  type: NodePort
  selector:
    app: tpmetrics-app
  ports:
    - name: http
      port: 8000
      targetPort: http
      nodePort: 30080
