apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager.monitoring.svc.cluster.local:9093

    rule_files:
      - /etc/prometheus/rules/alert_rules.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: component

  alert_rules.yml: |
    groups:
      - name: component-availability-scrape
        rules:
          - alert: PrometheusTargetUnavailable
            expr: (min by (component) (up{job="kubernetes-pods", namespace="monitoring", component="prometheus"}) < 1) or absent(up{job="kubernetes-pods", namespace="monitoring", component="prometheus"})
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: Prometheus indisponible via collecte
              description: Prometheus n'est pas scrapeable par Prometheus.

          - alert: AlertmanagerTargetUnavailable
            expr: (min by (component) (up{job="kubernetes-pods", namespace="monitoring", component="alertmanager"}) < 1) or absent(up{job="kubernetes-pods", namespace="monitoring", component="alertmanager"})
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: Alertmanager indisponible via collecte
              description: Alertmanager n'est pas scrapeable par Prometheus.

          - alert: GrafanaTargetUnavailable
            expr: (min by (component) (up{job="kubernetes-pods", namespace="monitoring", component="grafana"}) < 1) or absent(up{job="kubernetes-pods", namespace="monitoring", component="grafana"})
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: Grafana indisponible via collecte
              description: Grafana n'est pas scrapeable par Prometheus.

          - alert: NodeExporterTargetUnavailable
            expr: (min by (component) (up{job="kubernetes-pods", namespace="monitoring", component="node-exporter"}) < 1) or absent(up{job="kubernetes-pods", namespace="monitoring", component="node-exporter"})
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: node-exporter indisponible via collecte
              description: node-exporter n'est pas scrapeable par Prometheus.

          - alert: KubeStateMetricsTargetUnavailable
            expr: (min by (component) (up{job="kubernetes-pods", namespace="monitoring", component="kube-state-metrics"}) < 1) or absent(up{job="kubernetes-pods", namespace="monitoring", component="kube-state-metrics"})
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: kube-state-metrics indisponible via collecte
              description: kube-state-metrics n'est pas scrapeable par Prometheus.

          - alert: AppTargetUnavailable
            expr: (min by (component) (up{job="kubernetes-pods", namespace="app", component="tpmetrics-app"}) < 1) or absent(up{job="kubernetes-pods", namespace="app", component="tpmetrics-app"})
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: Application HTTP indisponible via collecte
              description: tpmetrics-app n'est pas scrapeable par Prometheus.

      - name: app-alerts
        rules:
          - alert: HighHttp5xxRate
            expr: sum(increase(app_http_requests_total{status_family="5xx"}[5m])) > 20
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: Trop d'erreurs 5xx
              description: L'application a produit plus de 20 erreurs 5xx sur les 5 dernieres minutes.

          - alert: AlertmanagerUnavailableInKubernetes
            expr: kube_deployment_status_replicas_available{namespace="monitoring", deployment="alertmanager"} < 1
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: Alertmanager indisponible dans Kubernetes
              description: Le deployment Alertmanager n'a plus de replica disponible.

          - alert: HighBusinessLoad
            expr: sum(increase(app_processed_items_total[5m])) > 200
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: Charge applicative elevee
              description: L'application a traite plus de 200 items en 5 minutes.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v3.5.3
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
              name: web
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
      volumes:
        - name: config
          configMap:
            name: prometheus-config
            items:
              - key: prometheus.yml
                path: prometheus.yml
        - name: rules
          configMap:
            name: prometheus-config
            items:
              - key: alert_rules.yml
                path: alert_rules.yml
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: web
      nodePort: 30090
