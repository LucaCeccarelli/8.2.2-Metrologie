kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: tp-observability
nodes:
  - role: control-plane
    extraMounts:
      - hostPath: grafana
        containerPath: /grafana
        readOnly: true
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP
      - containerPort: 30093
        hostPort: 9093
        protocol: TCP
      - containerPort: 30030
        hostPort: 3000
        protocol: TCP
